<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D GM Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600&display=swap');

        :root {
            --gold-light: #d4af37;
            --gold-dark: #8b7348;
            --bg-texture: linear-gradient(135deg, #1c140d 0%, #0a0705 100%);
            --card-bg: linear-gradient(145deg, #2a2118, #1a140f);
        }

        body { 
            font-family: 'Cormorant Garamond', serif; 
            background: var(--bg-texture); 
            color: #dcdde1; 
            margin: 0; 
            padding: 20px; 
        }

        h1 { 
            text-align: center; 
            color: var(--gold-light); 
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            text-shadow: 2px 2px 5px #000;
            margin-bottom: 30px; 
            border-bottom: 2px solid var(--gold-dark);
            padding-bottom: 10px;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .player-card { 
            background: var(--card-bg); 
            border: 2px solid var(--gold-dark); 
            border-radius: 6px; 
            padding: 15px; 
            position: relative; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .player-card.inactive { 
            opacity: 0.4; 
            filter: grayscale(100%); 
            border-color: #444;
        }

        .player-card h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            margin-top: 0;
            color: var(--gold-light);
            text-shadow: 1px 1px 2px #000;
        }

        .form-group { 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .form-group label { 
            font-family: 'Cinzel', serif;
            font-size: 0.9rem; 
            color: #bdc3c7; 
            width: 70px; 
        }

        .form-group input, .form-group select { 
            flex: 1; 
            padding: 8px; 
            background: #110d0a; 
            border: 1px solid var(--gold-dark); 
            color: var(--gold-light); 
            border-radius: 4px; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-weight: bold;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold-light);
            box-shadow: 0 0 5px var(--gold-dark);
        }

        .form-group select[multiple] {
            height: 80px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
        }

        /* Container khusus untuk select kondisi dan tombol clear */
        .condition-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn-clear-cond {
            background: linear-gradient(to bottom, #34495e, #1a252f);
            color: #bdc3c7;
            border: 1px solid #5d6d7e;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-clear-cond:hover {
            color: white;
            border-color: var(--gold-light);
        }

        .hp-controls { 
            display: flex; 
            gap: 5px; 
            margin-top: 15px; 
            justify-content: center; 
        }

        .hp-controls button { 
            padding: 8px 12px; 
            border: 1px solid; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: 'Cinzel', serif;
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }

        .hp-controls button:active { transform: scale(0.95); }

        .btn-dmg { 
            background: linear-gradient(to bottom, #8a0303, #4a0000); 
            color: white; 
            border-color: #ff3333;
        }

        .btn-heal { 
            background: linear-gradient(to bottom, #1e5631, #0a2e15); 
            color: white; 
            border-color: #4caf50;
        }

        .btn-overlay { 
            width: 100%; padding: 10px; margin-top: 15px; 
            background: linear-gradient(to bottom, #b86704, #7a4100); 
            color: white; border: 1px solid #f39c12; 
            border-radius: 4px; cursor: pointer; 
            font-family: 'Cinzel', serif; font-weight: bold;
            display: flex; justify-content: center; align-items: center; gap: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        }
        .btn-overlay:hover { filter: brightness(1.2); }

        .btn-toggle { 
            width: 100%; padding: 10px; margin-top: 10px; 
            background: linear-gradient(to bottom, #34495e, #1a252f); 
            color: white; border: 1px solid #5d6d7e; 
            border-radius: 4px; cursor: pointer;
            font-family: 'Cinzel', serif;
        }

        .btn-reset { 
            display: block; margin: 40px auto; padding: 12px 25px; 
            background: linear-gradient(to bottom, #4a235a, #2a0a3a); 
            color: var(--gold-light); border: 2px solid #8e44ad; 
            border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; 
            font-size: 1.2rem; text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

    <h1>D&D Game Master Dashboard</h1>
    
    <div class="grid-container" id="gmGrid">
        </div>

    <button class="btn-reset" onclick="resetAll()">Reset Semua Data</button>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default';
    const storageKey = 'dnd_session_data_' + roomId;

    const allConditions = [
        "Blinded", "Charmed", "Deafened", "Frightened", "Grappled", 
        "Incapacitated", "Invisible", "Paralyzed", "Petrified", 
        "Poisoned", "Prone", "Restrained", "Stunned", "Unconscious"
    ];

    const defaultData = Array.from({length: 10}, (_, i) => ({
        id: `p${i+1}`,
        active: i < 4, 
        name: `Player ${i+1}`,
        className: "Class",
        level: 1, 
        ac: 10,
        hp: 20,
        maxHp: 20,
        conditions: [] 
    }));

    let sessionData = JSON.parse(localStorage.getItem(storageKey)) || defaultData;
    
    sessionData = sessionData.map(p => ({ 
        ...p, 
        level: p.level || 1,
        conditions: p.conditions || []
    }));

    // Menampilkan Info Room di Judul Dashboard
    document.querySelector('h1').innerHTML = `D&D GM Dashboard <br><span style="font-size: 1rem; color: #bdc3c7;">Room: ${roomId}</span>`;

    function renderDashboard() {
        const grid = document.getElementById('gmGrid');
        grid.innerHTML = '';

        sessionData.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = `player-card ${player.active ? '' : 'inactive'}`;
            
            let conditionOptions = allConditions.map(cond => 
                `<option value="${cond}" ${player.conditions.includes(cond) ? 'selected' : ''}>${cond}</option>`
            ).join('');

            card.innerHTML = `
                <div style="position: absolute; top: 10px; right: 10px; background: #110d0a; border: 1px solid var(--gold-dark); padding: 2px 6px; border-radius: 4px; font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold-light);">ID: ${player.id}</div>
                <h3>Slot ${index + 1}</h3>
                
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" value="${player.name}" onchange="updateData(${index}, 'name', this.value)" ${!player.active ? 'disabled' : ''}>
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" value="${player.className}" onchange="updateData(${index}, 'className', this.value)" ${!player.active ? 'disabled' : ''}>
                </div>
                <div class="form-group">
                    <label>Level</label>
                    <input type="number" value="${player.level}" onchange="updateData(${index}, 'level', this.value)" ${!player.active ? 'disabled' : ''} min="1" max="20">
                </div>
                <div class="form-group">
                    <label>AC</label>
                    <input type="number" value="${player.ac}" onchange="updateData(${index}, 'ac', this.value)" ${!player.active ? 'disabled' : ''}>
                </div>
                <div class="form-group">
                    <label>Max HP</label>
                    <input type="number" value="${player.maxHp}" onchange="updateData(${index}, 'maxHp', this.value)" ${!player.active ? 'disabled' : ''}>
                </div>
                <div class="form-group">
                    <label>Current HP</label>
                    <input type="number" value="${player.hp}" onchange="updateData(${index}, 'hp', this.value)" ${!player.active ? 'disabled' : ''}>
                </div>
                
                <div class="form-group" style="align-items: flex-start;">
                    <label style="margin-top: 8px;">Kondisi</label>
                    <div class="condition-container">
                        <select multiple onchange="updateConditions(${index}, this)" ${!player.active ? 'disabled' : ''}>
                            ${conditionOptions}
                        </select>
                        <button class="btn-clear-cond" onclick="clearConditions(${index})" ${!player.active ? 'disabled' : ''}>
                            Set ke Normal
                        </button>
                    </div>
                </div>

                <div class="hp-controls">
                    <button class="btn-dmg" onclick="modifyHP(${index}, -5)" ${!player.active ? 'disabled' : ''}>-5 HP</button>
                    <button class="btn-dmg" onclick="modifyHP(${index}, -1)" ${!player.active ? 'disabled' : ''}>-1 HP</button>
                    <button class="btn-heal" onclick="modifyHP(${index}, 1)" ${!player.active ? 'disabled' : ''}>+1 HP</button>
                    <button class="btn-heal" onclick="modifyHP(${index}, 5)" ${!player.active ? 'disabled' : ''}>+5 HP</button>
                </div>

                <button class="btn-overlay" onclick="window.open('player-overlay.html?id=${player.id}&room=${roomId}', '_blank')" ${!player.active ? 'disabled' : ''}>
                    Buka Overlay Stream
                </button>

                <button class="btn-toggle" onclick="togglePlayer(${index})">
                    ${player.active ? 'Nonaktifkan Player' : 'Aktifkan Player'}
                </button>
            `;
            grid.appendChild(card);
        });

        saveData();
    }

    function updateData(index, key, value) {
        sessionData[index][key] = (key === 'ac' || key === 'hp' || key === 'maxHp' || key === 'level') ? parseInt(value) || 0 : value;
        saveData();
        renderDashboard(); 
    }

    function updateConditions(index, selectElement) {
        const selectedConditions = Array.from(selectElement.selectedOptions).map(option => option.value);
        sessionData[index].conditions = selectedConditions;
        saveData();
        renderDashboard();
    }

    function clearConditions(index) {
        sessionData[index].conditions = [];
        saveData();
        renderDashboard();
    }

    function modifyHP(index, amount) {
        let newHP = sessionData[index].hp + amount;
        if (newHP < 0) newHP = 0;
        if (newHP > sessionData[index].maxHp) newHP = sessionData[index].maxHp;
        
        sessionData[index].hp = newHP;
        saveData();
        renderDashboard();
    }

    function togglePlayer(index) {
        sessionData[index].active = !sessionData[index].active;
        saveData();
        renderDashboard();
    }

    function saveData() {
        localStorage.setItem(storageKey, JSON.stringify(sessionData));
    }

    function resetAll() {
        if(confirm("Yakin ingin mereset semua data di Room " + roomId + " kembali ke default?")) {
            sessionData = JSON.parse(JSON.stringify(defaultData));
            saveData();
            renderDashboard();
        }
    }

    renderDashboard();
</script>

</body>
</html>
