<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Controller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600&display=swap');
        :root { --gold-light: #d4af37; --gold-dark: #8b7348; --bg-texture: linear-gradient(135deg, #1c140d 0%, #0a0705 100%); --panel-bg: linear-gradient(145deg, #2a2118, #1a140f); }
        body { font-family: 'Cormorant Garamond', serif; background: var(--bg-texture); color: #dcdde1; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .remote-container { background: var(--panel-bg); width: 100%; max-width: 450px; border-radius: 8px; padding: 20px; border: 3px solid #5c4a2e; box-shadow: 0 15px 30px rgba(0,0,0,0.9); }
        .remote-container.is-dying { background: #300000; border-color: #ff3333; }
        
        /* Tab System */
        .tab-menu { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid var(--gold-dark); }
        .tab-btn { flex: 1; padding: 10px; background: #110d0a; border: none; color: #888; font-family: 'Cinzel'; cursor: pointer; border-radius: 5px 5px 0 0; }
        .tab-btn.active { background: var(--gold-dark); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .stat-box { background: #110d0a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--gold-dark); text-align: center; }
        .stat-box h2 { margin: 0; font-family: 'Cinzel'; font-size: 2.5rem; color: #ff4757; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-family: 'Cinzel'; font-weight: bold; border-radius: 6px; cursor: pointer; color: white; border: none; }
        .btn-dmg { background: linear-gradient(to bottom, #8a0303, #4a0000); }
        .btn-heal { background: linear-gradient(to bottom, #1e5631, #0a2e15); }
        
        /* List Inputs */
        textarea, input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--gold-dark); color: #fff; box-sizing: border-box; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
        .log-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; height: 100px; overflow-y: auto; font-size: 0.9rem; border: 1px solid #333; margin-top: 10px; }
        .log-entry { border-bottom: 1px solid #222; padding: 3px 0; color: #aaa; }
        
        #pinOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-texture); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .pin-box { background: var(--panel-bg); padding: 30px; border-radius: 8px; border: 2px solid var(--gold-dark); text-align: center; }
    </style>
</head>
<body>

    <div id="pinOverlay" style="display: none;">
        <div class="pin-box">
            <h2 style="font-family: 'Cinzel'; color: var(--gold-light);">Keamanan Sesi</h2>
            <input type="password" id="inputPin" placeholder="PIN" style="text-align:center; font-size:1.5rem;">
            <button class="btn-heal" style="width: 100%;" onclick="validatePin()">Masuk</button>
        </div>
    </div>

    <div class="remote-container" id="remoteController" style="display: none;">
        <div style="text-align:center; margin-bottom:10px;">
            <h1 id="ctrlName" style="margin:0; font-family:'Cinzel'; color:var(--gold-light);">---</h1>
            <div id="turnBadge" style="display:none; color:#f1c40f; font-weight:bold;">🔥 GILIRANMU! 🔥</div>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('combat')">Combat</button>
            <button class="tab-btn" onclick="openTab('skills')">Skills</button>
            <button class="tab-btn" onclick="openTab('inv')">Inv</button>
        </div>

        <div id="combat" class="tab-content active">
            <div class="stat-box">
                <div id="hpLabel">HP</div>
                <h2><span id="ctrlCurrentHP">0</span> / <span id="ctrlMaxHP">0</span></h2>
                <div style="font-size:0.9rem; color:var(--gold-light);">AC: <span id="ctrlAC">10</span> | Exhaust: <span id="ctrlExh">0</span></div>
            </div>

            <div class="controls-grid" id="hpButtons">
                <button class="btn-dmg" onclick="modifyHP(-5)">-5 HP</button>
                <button class="btn-heal" onclick="modifyHP(5)">+5 HP</button>
                <button class="btn-dmg" onclick="modifyHP(-1)">-1 HP</button>
                <button class="btn-heal" onclick="modifyHP(1)">+1 HP</button>
            </div>

            <div id="deathSaves" class="stat-box" style="display:none; border-color:#ff3333;">
                <h3 style="color:#ff3333; margin:0;">DEATH SAVES</h3>
                <div style="margin:10px 0;">S: <span id="dsSucc">0</span> | G: <span id="dsFail">0</span></div>
                <button class="btn-heal" style="width:45%; background:#2ecc71" onclick="addDeathSave('success')">SUCCESS</button>
                <button class="btn-dmg" style="width:45%; background:#c0392b" onclick="addDeathSave('fail')">FAIL</button>
            </div>

            <div class="log-box" id="combatLog">
                <div class="log-entry">Menunggu log aksi...</div>
            </div>
        </div>

        <div id="skills" class="tab-content">
            <h3 style="font-family:'Cinzel'; margin-top:0;">Catatan Skill / Mantra</h3>
            <textarea id="skillNotes" rows="12" placeholder="Contoh: 
- Fireball (3/3 slots)
- Sneak Attack (2d6)" onchange="updateSkills()"></textarea>
        </div>

        <div id="inv" class="tab-content">
            <h3 style="font-family:'Cinzel'; margin-top:0;">Harta & Barang</h3>
            <div class="form-group"><label>Gold</label><input type="number" id="invGold" value="0" onchange="updateInv()"></div>
            <textarea id="invItems" rows="10" placeholder="List barang bawaan..." onchange="updateInv()"></textarea>
        </div>
    </div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'default';
        const playerId = urlParams.get('id') || 'p1';
        const urlKey = urlParams.get('key') || '';
        let myPin = urlKey ? atob(urlKey) : "";

        const syncTopic = 'campaign-dnd-room-' + roomId + '/sync';
        const actionTopic = 'campaign-dnd-room-' + roomId + '/action';
        const guardTopic = 'campaign-dnd-room-' + roomId + '/guard/' + playerId;

        let myInstanceId = sessionStorage.getItem('dnd_instance_id_'+roomId+'_'+playerId) || Math.random().toString(36).substr(2,9);
        sessionStorage.setItem('dnd_instance_id_'+roomId+'_'+playerId, myInstanceId);

        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let sessionDataCache = null;
        let isSlotOwner = false;

        if (!myPin) document.getElementById('pinOverlay').style.display = 'flex';
        else document.getElementById('remoteController').style.display = 'block';

        client.on('connect', () => {
            client.subscribe(syncTopic);
            client.subscribe(guardTopic);
            client.publish(guardTopic, JSON.stringify({ type: 'PLAYER_CHECK', id: myInstanceId }));
            setTimeout(() => { if (!isSlotOwner) { isSlotOwner = true; requestSync(); } }, 1000);
        });

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            if (topic === guardTopic && data.id !== myInstanceId) {
                if (data.type === 'PLAYER_CHECK' && isSlotOwner) client.publish(guardTopic, JSON.stringify({ type: 'PLAYER_OCCUPIED', id: myInstanceId }));
                else if (data.type === 'PLAYER_OCCUPIED') { alert("Slot terpakai!"); window.location.href = 'index.html'; }
            }
            if (topic === syncTopic && data.pin === myPin) {
                sessionDataCache = data.session;
                updateUI();
            }
        });

        window.openTab = function(tabName) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        window.validatePin = function() {
            myPin = document.getElementById('inputPin').value;
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('remoteController').style.display = 'block';
            requestSync();
        };

        function requestSync() { if(client.connected && myPin) client.publish(actionTopic, JSON.stringify({ type: 'REQUEST_SYNC', pin: myPin })); }

        function updateUI() {
            const p = sessionDataCache.find(x => x.id === playerId);
            if (!p || !p.active) return;

            document.getElementById('ctrlName').innerText = p.name;
            document.getElementById('ctrlCurrentHP').innerText = p.hp;
            document.getElementById('ctrlMaxHP').innerText = p.maxHp;
            document.getElementById('ctrlAC').innerText = p.ac;
            document.getElementById('ctrlExh').innerText = p.exhaustion;
            document.getElementById('turnBadge').style.display = p.isTurn ? 'block' : 'none';

            // Sync Skill & Inv jika sedang tidak fokus mengetik
            if (document.activeElement !== document.getElementById('skillNotes')) document.getElementById('skillNotes').value = p.skills.join('\n');
            if (document.activeElement !== document.getElementById('invGold')) document.getElementById('invGold').value = p.inventory.gold;
            if (document.activeElement !== document.getElementById('invItems')) document.getElementById('invItems').value = p.inventory.items;

            const remote = document.getElementById('remoteController');
            if (p.hp <= 0 && p.maxHp > 0) {
                remote.classList.add('is-dying');
                document.getElementById('hpButtons').style.display = 'none';
                document.getElementById('deathSaves').style.display = 'block';
                document.getElementById('dsSucc').innerText = p.deathSaves.success;
                document.getElementById('dsFail').innerText = p.deathSaves.fail;
            } else {
                remote.classList.remove('is-dying');
                document.getElementById('hpButtons').style.display = 'grid';
                document.getElementById('deathSaves').style.display = 'none';
            }
        }

        window.modifyHP = function(a) {
            client.publish(actionTopic, JSON.stringify({ type: 'ACTION', action: 'MODIFY_HP', playerId, amount: a, pin: myPin }));
            addLog(a > 0 ? `Heal +${a} HP` : `Damage ${a} HP`);
        };

        window.addDeathSave = function(t) {
            client.publish(actionTopic, JSON.stringify({ type: 'ACTION', action: 'DEATH_SAVE', playerId, saveType: t, pin: myPin }));
            addLog(`Death Save: ${t.toUpperCase()}`);
        };

        window.updateSkills = function() {
            const skills = document.getElementById('skillNotes').value.split('\n');
            client.publish(actionTopic, JSON.stringify({ type: 'ACTION', action: 'UPDATE_SKILLS', playerId, skills, pin: myPin }));
        };

        window.updateInv = function() {
            const inventory = { gold: parseInt(document.getElementById('invGold').value), items: document.getElementById('invItems').value };
            client.publish(actionTopic, JSON.stringify({ type: 'ACTION', action: 'UPDATE_INV', playerId, inventory, pin: myPin }));
        };

        function addLog(msg) {
            const box = document.getElementById('combatLog');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            box.innerHTML = `<div class="log-entry">[${time}] ${msg}</div>` + box.innerHTML;
        }
    });
</script>
</body>
</html>
