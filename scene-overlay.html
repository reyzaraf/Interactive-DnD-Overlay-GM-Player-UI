<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scene Banner Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600&display=swap');
        body { margin: 0; padding: 20px; background: transparent; overflow: hidden; display: flex; justify-content: center; }
        .banner-container {
            background: linear-gradient(145deg, #2a2118, #1a140f);
            border: 3px solid #8b7348;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.8);
            border-radius: 4px; padding: 15px 40px; text-align: center;
            min-width: 400px; position: relative;
        }
        .banner-container::before {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 1px solid #c5a059; pointer-events: none; opacity: 0.5;
        }
        h1 { margin: 0; font-family: 'Cinzel', serif; font-size: 2rem; color: #d4af37; text-shadow: 2px 2px 4px #000; letter-spacing: 2px; }
        p { margin: 5px 0 0 0; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: #e74c3c; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="banner-container hidden" id="sceneBanner">
        <h1 id="sceneTitle">Loading...</h1>
        <p id="sceneSubtitle">Loading...</p>
    </div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default';
    const sceneKey = 'dnd_scene_data_' + roomId;

    function updateScene() {
        const rawData = localStorage.getItem(sceneKey);
        const banner = document.getElementById('sceneBanner');
        if (!rawData) { banner.classList.add('hidden'); return; }
        
        const data = JSON.parse(rawData);
        if (!data.title && !data.subtitle) {
            banner.classList.add('hidden'); return;
        }
        
        banner.classList.remove('hidden');
        document.getElementById('sceneTitle').innerText = data.title;
        document.getElementById('sceneSubtitle').innerText = data.subtitle;
    }
    updateScene();
    window.addEventListener('storage', e => { if (e.key === sceneKey) updateScene(); });
</script>
</body>
</html>
