<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D GM Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600&display=swap');
        :root { --gold-light: #d4af37; --gold-dark: #8b7348; --bg-texture: linear-gradient(135deg, #1c140d 0%, #0a0705 100%); --card-bg: linear-gradient(145deg, #2a2118, #1a140f); }
        body { font-family: 'Cormorant Garamond', serif; background: var(--bg-texture); color: #dcdde1; margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 2.5rem; text-shadow: 2px 2px 5px #000; margin-bottom: 20px; border-bottom: 2px solid var(--gold-dark); padding-bottom: 10px; }
        
        .scene-panel { background: #110d0a; border: 2px solid var(--gold-dark); padding: 20px; border-radius: 6px; margin-bottom: 30px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .scene-panel h2 { margin-top: 0; color: #bdc3c7; font-family: 'Cinzel', serif; font-size: 1.2rem; }
        .scene-inputs { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .scene-inputs input { padding: 10px; background: #222; border: 1px solid var(--gold-dark); color: white; border-radius: 4px; font-size: 1rem; width: 30%; }
        .btn-scene { padding: 10px 20px; background: linear-gradient(to bottom, #b86704, #7a4100); color: white; border: 1px solid #f39c12; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; border-radius: 4px; }
        .top-controls { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .btn-action { padding: 10px 20px; background: #34495e; color: white; border: 1px solid #5d6d7e; cursor: pointer; font-family: 'Cinzel', serif; border-radius: 4px; font-weight: bold; }

        /* Modal / Popup Styling */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--panel-bg); margin: 5% auto; padding: 30px; border: 2px solid var(--gold-dark); width: 80%; max-width: 700px; border-radius: 8px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold-dark); padding-bottom: 15px; margin-bottom: 20px; }
        .modal-header h2 { font-family: 'Cinzel'; color: var(--gold-light); margin: 0; }
        .close-btn { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #fff; }
        
        .link-row { display: flex; align-items: center; justify-content: space-between; background: #110d0a; padding: 10px 15px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #3d2e18; }
        .link-row span { font-family: monospace; color: #888; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 15px; }
        .link-row b { font-family: 'Cinzel'; color: var(--gold-light); width: 120px; flex-shrink: 0; }
        .btn-copy-small { padding: 5px 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-family: 'Cinzel'; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .player-card { background: var(--card-bg); border: 2px solid var(--gold-dark); border-radius: 6px; padding: 15px; position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5); }
        .player-card.inactive { opacity: 0.4; filter: grayscale(100%); border-color: #444; }
        .player-card.is-turn { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .player-card h3 { font-family: 'Cinzel', serif; font-size: 1.3rem; margin-top: 0; color: var(--gold-light); text-shadow: 1px 1px 2px #000; }
        
        .form-group { margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .form-group label { font-family: 'Cinzel', serif; font-size: 0.9rem; color: #bdc3c7; width: 70px; }
        .form-group input, .form-group select { flex: 1; padding: 6px; background: #110d0a; border: 1px solid var(--gold-dark); color: var(--gold-light); border-radius: 4px; font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: bold; width: 100%; box-sizing: border-box; }
        .form-group select[multiple] { height: 70px; font-family: 'Cormorant Garamond', serif; font-size: 1rem; }
        .condition-container { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .btn-clear-cond { background: linear-gradient(to bottom, #34495e, #1a252f); color: #bdc3c7; border: 1px solid #5d6d7e; padding: 4px; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.8rem; }
        
        .hp-controls { display: flex; gap: 5px; margin-top: 15px; justify-content: center; }
        .hp-controls button { padding: 8px 12px; border: 1px solid; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; }
        .btn-dmg { background: linear-gradient(to bottom, #8a0303, #4a0000); color: white; border-color: #ff3333; }
        .btn-heal { background: linear-gradient(to bottom, #1e5631, #0a2e15); color: white; border-color: #4caf50; }
        
        .death-saves-panel { text-align: center; background: #300000; padding: 10px; border-radius: 4px; border: 1px solid #ff3333; margin-top: 10px; }
        .death-saves-panel p { margin: 0 0 5px 0; color: #fff; font-family: 'Cinzel', serif; }

        .btn-overlay { width: 100%; padding: 10px; margin-top: 15px; background: linear-gradient(to bottom, #b86704, #7a4100); color: white; border: 1px solid #f39c12; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; }
        .btn-copy { width: 100%; padding: 10px; margin-top: 5px; background: linear-gradient(to bottom, #1e5631, #0a2e15); color: white; border: 1px solid #4caf50; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; }
        .btn-toggle { width: 100%; padding: 10px; margin-top: 10px; background: linear-gradient(to bottom, #34495e, #1a252f); color: white; border: 1px solid #5d6d7e; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; }
        .btn-reset { display: block; margin: 40px auto; padding: 12px 25px; background: linear-gradient(to bottom, #4a235a, #2a0a3a); color: var(--gold-light); border: 2px solid #8e44ad; border-radius: 4px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="top-controls">
        <button class="btn-action" style="background: linear-gradient(to bottom, #34495e, #1a252f); border-color: #5d6d7e;" onclick="window.location.href='index.html'">
            🔙 Kembali ke Lobby
        </button>
        <button class="btn-action" style="background: linear-gradient(to bottom, #d4af37, #8b7348); color: #000;" onclick="toggleHub()">
            🔗 Stream Link Hub (OBS)
        </button>
    </div>

    <h1 id="mainTitle">D&D GM Dashboard</h1>

    <div id="hubModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Stream Operator Hub</h2>
                <span class="close-btn" onclick="toggleHub()">&times;</span>
            </div>
            <p style="color: #aaa; font-style: italic; margin-bottom: 20px;">Salin link di bawah ini dan tempelkan sebagai <b>Browser Source</b> di OBS.</p>
            
            <h3 style="color: var(--gold-light); font-family: 'Cinzel'; font-size: 1rem; border-bottom: 1px solid #333;">Global Overlay</h3>
            <div class="link-row">
                <b>Scene Banner</b>
                <span id="urlScene">...</span>
                <button class="btn-copy-small" onclick="copyFromHub('urlScene')">Copy</button>
            </div>

            <h3 style="color: var(--gold-light); font-family: 'Cinzel'; font-size: 1rem; border-bottom: 1px solid #333; margin-top: 20px;">Player Overlays</h3>
            <div id="playerOverlayLinks">
                </div>
        </div>
    </div>

    <div class="scene-panel">
        <h2 id="serverStatus">⏳ Menyiapkan Server Room...</h2>
        <div class="scene-inputs">
            <input type="text" id="sceneTitleInput" placeholder="📍 Map / Lokasi Saat Ini (Hutan Gelap)">
            <input type="text" id="sceneSubtitleInput" placeholder="💀 Nama Boss / Target (Naga Merah)">
        </div>
        <button class="btn-scene" onclick="updateSceneData()">Tampilkan di Stream</button>
        <button class="btn-scene" style="background: #333;" onclick="clearSceneData()">Sembunyikan</button>
        <br>
        <button class="btn-scene" style="background: linear-gradient(to bottom, #2980b9, #1a5276); border-color: #3498db; margin-top: 15px; width: 100%; max-width: 400px;" onclick="openSceneOverlay()">📺 Buka Scene Banner di Tab Baru</button>
    </div>

    <div class="top-controls">
        <button class="btn-action" onclick="sortInitiative()">Urutkan Inisiatif Tertinggi</button>
        <button class="btn-action" style="background: #27ae60; border-color: #2ecc71;" onclick="nextTurn()">Giliran Berikutnya (Next Turn) ⏭️</button>
    </div>
    
    <div class="grid-container" id="gmGrid"></div>

    <button class="btn-reset" onclick="resetAll()">Reset Semua Data</button>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default';
    const key = urlParams.get('key') || '';
    const myPin = key ? atob(key) : '';
    
    const roomKey = 'dnd_session_' + roomId;
    const sceneKey = 'dnd_scene_' + roomId;
    const syncTopic = 'campaign-dnd-room-' + roomId + '/sync';
    const actionTopic = 'campaign-dnd-room-' + roomId + '/action';
    const guardTopic = 'campaign-dnd-room-' + roomId + '/guard';

    // Persistence ID untuk GM
    let myInstanceId = sessionStorage.getItem('dnd_gm_instance_id_' + roomId);
    if (!myInstanceId) {
        myInstanceId = Math.random().toString(36).substr(2, 9);
        sessionStorage.setItem('dnd_gm_instance_id_' + roomId, myInstanceId);
    }

    const allConditions = ["Blinded", "Charmed", "Deafened", "Frightened", "Grappled", "Incapacitated", "Invisible", "Paralyzed", "Petrified", "Poisoned", "Prone", "Restrained", "Stunned", "Unconscious"];

    // Data Default Baru yang menyertakan Skills, Inventory, dan Exhaustion
    const defaultData = Array.from({length: 10}, (_, i) => ({
        id: `p${i+1}`, active: i < 4, name: `Player ${i+1}`, className: "Class", level: 1, ac: 10, hp: 20, maxHp: 20,
        conditions: [], initiative: 0, isTurn: false, deathSaves: { success: 0, fail: 0 },
        skills: [], inventory: { gold: 0, items: "" }, exhaustion: 0
    }));

    // BUG FIX: Pengecekan ketat jika localStorage kosong atau rusak (Anti-Crash)
    let sessionData;
    try {
        sessionData = JSON.parse(localStorage.getItem(roomKey));
        if (!Array.isArray(sessionData) || sessionData.length === 0) {
            sessionData = JSON.parse(JSON.stringify(defaultData));
        }
    } catch (error) {
        sessionData = JSON.parse(JSON.stringify(defaultData));
    }

    // Pemetaan untuk menjaga kompatibilitas dengan save data lama
    sessionData = sessionData.map((p, i) => {
        if (!p) p = defaultData[i]; // Jika ada data slot yang null, kembalikan ke default
        return { 
            ...p, 
            level: p.level || 1, 
            conditions: Array.isArray(p.conditions) ? p.conditions : [], 
            initiative: p.initiative || 0, 
            isTurn: p.isTurn || false, 
            deathSaves: p.deathSaves || { success: 0, fail: 0 },
            skills: Array.isArray(p.skills) ? p.skills : [], 
            inventory: p.inventory || { gold: 0, items: "" }, 
            exhaustion: p.exhaustion || 0 
        };
    });

    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    let isRoomOwner = false;

    client.on('connect', () => {
        client.subscribe(guardTopic);
        client.subscribe(actionTopic);
        client.publish(guardTopic, JSON.stringify({ type: 'PING', id: myInstanceId }));

        setTimeout(() => {
            if (!isRoomOwner) {
                isRoomOwner = true;
                const statusUpdate = document.getElementById('serverStatus');
                if (statusUpdate) {
                    statusUpdate.innerHTML = `🌐 Sinyal Online (Room: ${roomId})`;
                    statusUpdate.style.color = '#2ecc71';
                }
                renderDashboard();
                broadcastState();
                generateHubLinks();
            }
        }, 1200);
    });

    client.on('message', (topic, message) => {
        try {
            const data = JSON.parse(message.toString());
            if (topic === guardTopic) {
                if (data.id !== myInstanceId) {
                    if (data.type === 'PING' && isRoomOwner) {
                        client.publish(guardTopic, JSON.stringify({ type: 'PONG', id: myInstanceId }));
                    } else if (data.type === 'PONG') {
                        alert("ROOM SEDANG TERPAKAI DI PERANGKAT ATAU TAB LAIN!");
                        window.location.href = 'index.html';
                    }
                }
            }
            if (topic === actionTopic && isRoomOwner) {
                if (data.pin !== myPin) return;
                if (data.type === 'REQUEST_SYNC') broadcastState();
                else if (data.type === 'ACTION') handlePlayerAction(data);
            }
        } catch (e) { console.error(e); }
    });

    // --- FUNGSI HUB OPERATOR ---
    window.toggleHub = function() {
        const modal = document.getElementById('hubModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    function generateHubLinks() {
        const basePath = window.location.href.split('?')[0].replace('gm-dashboard.html', '');
        
        document.getElementById('urlScene').innerText = `${basePath}scene-overlay.html?room=${roomId}&key=${key}`;
        
        const container = document.getElementById('playerOverlayLinks');
        container.innerHTML = '';
        sessionData.forEach(p => {
            if(!p.active) return; // Hanya tampilkan link player yang aktif di hub
            const row = document.createElement('div');
            row.className = 'link-row';
            const url = `${basePath}player-overlay.html?id=${p.id}&room=${roomId}&key=${key}`;
            row.innerHTML = `
                <b>${p.name}</b>
                <span id="link-${p.id}">${url}</span>
                <button class="btn-copy-small" onclick="copyFromHub('link-${p.id}')">Copy</button>
            `;
            container.appendChild(row);
        });
    }

    window.copyFromHub = function(elementId) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.background = "#27ae60";
            setTimeout(() => { btn.innerText = originalText; btn.style.background = "#2ecc71"; }, 2000);
        });
    }
    // ----------------------------

    function broadcastState() {
        if (!client.connected || !isRoomOwner) return;
        const sceneData = JSON.parse(localStorage.getItem(sceneKey)) || {title: '', subtitle: ''};
        client.publish(syncTopic, JSON.stringify({ session: sessionData, scene: sceneData, pin: myPin }), { qos: 0, retain: true });
    }

    function handlePlayerAction(data) {
        const idx = sessionData.findIndex(p => p.id === data.playerId);
        if(idx === -1) return;

        if (data.action === 'MODIFY_HP') window.modifyHP(idx, data.amount);
        else if (data.action === 'DEATH_SAVE') {
            if(data.saveType === 'success') sessionData[idx].deathSaves.success = Math.min(sessionData[idx].deathSaves.success + 1, 3);
            else sessionData[idx].deathSaves.fail = Math.min(sessionData[idx].deathSaves.fail + 1, 3);
            saveData();
        }
        else if (data.action === 'UPDATE_SKILLS') { sessionData[idx].skills = data.skills; saveData(); }
        else if (data.action === 'UPDATE_INV') { sessionData[idx].inventory = data.inventory; saveData(); }
    }

    // Fungsi Global Input GM
    window.updateData = function(index, key, value) {
        sessionData[index][key] = (typeof sessionData[index][key] === 'number') ? parseInt(value) || 0 : value;
        if (key === 'hp' && sessionData[index].hp > 0) sessionData[index].deathSaves = { success: 0, fail: 0 };
        saveData(); 
    };

    window.updateConditions = function(index, selectElement) {
        sessionData[index].conditions = Array.from(selectElement.selectedOptions).map(opt => opt.value);
        saveData();
    };

    window.clearConditions = function(index) {
        sessionData[index].conditions = [];
        saveData();
    };

    window.modifyHP = function(index, amount) {
        let newHP = sessionData[index].hp + amount;
        sessionData[index].hp = Math.min(Math.max(newHP, 0), sessionData[index].maxHp);
        if (sessionData[index].hp > 0) sessionData[index].deathSaves = { success: 0, fail: 0 };
        saveData();
    };

    window.sortInitiative = function() { sessionData.sort((a, b) => b.initiative - a.initiative); saveData(); };

    window.nextTurn = function() {
        let cur = sessionData.findIndex(p => p.isTurn && p.active);
        sessionData.forEach(p => p.isTurn = false);
        let next = (cur + 1) % sessionData.length;
        let start = next;
        do {
            if(sessionData[next].active && sessionData[next].hp > 0) { sessionData[next].isTurn = true; return saveData(); }
            next = (next + 1) % sessionData.length;
        } while (next !== start);
        saveData();
    };

    window.togglePlayer = function(index) { 
        sessionData[index].active = !sessionData[index].active; 
        saveData(); 
        generateHubLinks(); 
    };
    
    window.resetAll = function() { 
        if(confirm("Apakah Anda yakin ingin menghapus semua data room ini?")) { 
            sessionData = JSON.parse(JSON.stringify(defaultData)); 
            saveData(); 
        } 
    };
    
    window.updateSceneData = function() {
        const title = document.getElementById('sceneTitleInput').value;
        const sub = document.getElementById('sceneSubtitleInput').value;
        localStorage.setItem(sceneKey, JSON.stringify({ title: title, subtitle: sub }));
        broadcastState(); 
        alert("Scene Banner Diperbarui di Stream!");
    };

    window.clearSceneData = function() {
        document.getElementById('sceneTitleInput').value = '';
        document.getElementById('sceneSubtitleInput').value = '';
        localStorage.setItem(sceneKey, JSON.stringify({ title: '', subtitle: '' }));
        broadcastState();
    };

    window.openSceneOverlay = function() { window.open(`scene-overlay.html?room=${roomId}&key=${key}`, '_blank'); };
    
    window.copyPlayerLink = function(playerId) {
        const basePath = window.location.href.split('?')[0].replace('gm-dashboard.html', '');
        const link = `${basePath}player-controller.html?id=${playerId}&room=${roomId}&key=${key}`;
        navigator.clipboard.writeText(link).then(() => alert(`Link disalin!`));
    };

    function saveData() { 
        localStorage.setItem(roomKey, JSON.stringify(sessionData)); 
        broadcastState(); 
        renderDashboard(); 
    }

    function renderDashboard() {
        const grid = document.getElementById('gmGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        sessionData.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = `player-card ${player.active ? '' : 'inactive'} ${player.isTurn ? 'is-turn' : ''}`;
            
            let conditionOptions = allConditions.map(cond => `<option value="${cond}" ${player.conditions.includes(cond) ? 'selected' : ''}>${cond}</option>`).join('');

            let hpSectionHTML = '';
            if (player.hp <= 0 && player.maxHp > 0) {
                hpSectionHTML = `<div class="death-saves-panel"><p>💀 SEKARAT</p>Sukses: ${player.deathSaves.success}/3 | Gagal: ${player.deathSaves.fail}/3<br><button class="btn-heal" style="margin-top:5px; padding: 4px;" onclick="modifyHP(${index}, 1)">Heal (Bangkit)</button></div>`;
            } else {
                hpSectionHTML = `<div class="hp-controls"><button class="btn-dmg" onclick="modifyHP(${index}, -5)">-5</button><button class="btn-dmg" onclick="modifyHP(${index}, -1)">-1</button><button class="btn-heal" onclick="modifyHP(${index}, 1)">+1</button><button class="btn-heal" onclick="modifyHP(${index}, 5)">+5</button></div>`;
            }

            // Struktur HTML Kartu yang Lengkap dan Rapih
            card.innerHTML = `
                <div style="position: absolute; top: 10px; right: 10px; background: #110d0a; border: 1px solid var(--gold-dark); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; color: var(--gold-light);">ID: ${player.id}</div>
                <h3>${player.isTurn ? '⚔️ ' : ''}${player.name} (Slot ${index + 1})</h3>
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <div class="form-group"><label>Nama</label><input type="text" value="${player.name}" onchange="updateData(${index}, 'name', this.value)" ${!player.active ? 'disabled' : ''}></div>
                        <div class="form-group"><label>Class</label><input type="text" value="${player.className}" onchange="updateData(${index}, 'className', this.value)" ${!player.active ? 'disabled' : ''}></div>
                        <div class="form-group"><label>Level</label><input type="number" value="${player.level}" onchange="updateData(${index}, 'level', this.value)" ${!player.active ? 'disabled' : ''}></div>
                    </div>
                    <div style="flex:1;">
                        <div class="form-group"><label>AC</label><input type="number" value="${player.ac}" onchange="updateData(${index}, 'ac', this.value)" ${!player.active ? 'disabled' : ''}></div>
                        <div class="form-group"><label>Inisiatif</label><input type="number" value="${player.initiative}" onchange="updateData(${index}, 'initiative', this.value)" ${!player.active ? 'disabled' : ''} style="border-color:#3498db;"></div>
                        <div class="form-group"><label>Max HP</label><input type="number" value="${player.maxHp}" onchange="updateData(${index}, 'maxHp', this.value)" ${!player.active ? 'disabled' : ''}></div>
                    </div>
                </div>

                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <div class="form-group"><label>Curr HP</label><input type="number" value="${player.hp}" onchange="updateData(${index}, 'hp', this.value)" ${!player.active ? 'disabled' : ''} style="color: ${player.hp <= 0 ? '#e74c3c' : '#d4af37'};"></div>
                    </div>
                    <div style="flex:1;">
                        <div class="form-group"><label>Exhaust</label><input type="number" value="${player.exhaustion || 0}" min="0" max="6" onchange="updateData(${index}, 'exhaustion', this.value)" ${!player.active ? 'disabled' : ''}></div>
                    </div>
                </div>

                <div class="form-group" style="align-items: flex-start;">
                    <label style="margin-top: 5px;">Kondisi</label>
                    <div class="condition-container">
                        <select multiple onchange="updateConditions(${index}, this)" ${!player.active ? 'disabled' : ''}>${conditionOptions}</select>
                        <button class="btn-clear-cond" onclick="clearConditions(${index})" ${!player.active ? 'disabled' : ''}>Set Normal</button>
                    </div>
                </div>

                ${hpSectionHTML}
                <button class="btn-overlay" onclick="window.open('player-overlay.html?id=${player.id}&room=${roomId}&key=${key}', '_blank')" ${!player.active ? 'disabled' : ''}>Buka Overlay Stream</button>
                <button class="btn-copy" onclick="copyPlayerLink('${player.id}')" ${!player.active ? 'disabled' : ''}>🔗 Copy Link Player Controller</button>
                <button class="btn-toggle" onclick="togglePlayer(${index})">${player.active ? 'Nonaktifkan Player' : 'Aktifkan Player'}</button>
            `;
            grid.appendChild(card);
        });
    }

    window.onclick = function(event) {
        const modal = document.getElementById('hubModal');
        if (event.target == modal) modal.style.display = "none";
    }

    document.addEventListener('DOMContentLoaded', () => {
        const existingSceneData = JSON.parse(localStorage.getItem(sceneKey));
        if(existingSceneData) {
            document.getElementById('sceneTitleInput').value = existingSceneData.title || '';
            document.getElementById('sceneSubtitleInput').value = existingSceneData.subtitle || '';
        }
        
        // Render slot player secara instan saat layar dimuat atau di-refresh, 
        // tidak perlu menunggu respon koneksi MQTT.
        renderDashboard();
    });
</script>
</body>
</html>
