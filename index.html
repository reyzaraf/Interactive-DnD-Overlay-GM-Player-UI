<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Stream Tracker - Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@600&display=swap');
        :root { --gold-light: #d4af37; --gold-dark: #8b7348; --bg-texture: linear-gradient(135deg, #1c140d 0%, #0a0705 100%); --panel-bg: linear-gradient(145deg, #2a2118, #1a140f); }
        body { font-family: 'Cormorant Garamond', serif; background: var(--bg-texture); color: #dcdde1; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .portal-container { background: var(--panel-bg); width: 100%; max-width: 500px; border-radius: 8px; padding: 40px 30px; border: 3px solid #5c4a2e; border-top-color: var(--gold-dark); border-left-color: var(--gold-dark); box-shadow: 0 15px 40px rgba(0,0,0,0.9); text-align: center; position: relative; }
        .header h1 { margin: 0; color: var(--gold-light); font-family: 'Cinzel', serif; font-size: 2.8rem; text-shadow: 2px 2px 5px #000; border-bottom: 2px solid var(--gold-dark); padding-bottom: 15px; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1.1rem; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; background: #110d0a; border: 2px solid var(--gold-dark); color: #fff; border-radius: 6px; font-size: 1.1rem; box-sizing: border-box; }
        
        .btn-enter { width: 100%; padding: 18px; font-size: 1.5rem; font-family: 'Cinzel', serif; font-weight: bold; border-radius: 6px; cursor: pointer; color: white; background: linear-gradient(to bottom, #1e5631, #0a2e15); border: 2px solid #4caf50; box-shadow: 0 6px 15px rgba(0,0,0,0.7); }
        
        #linkGenerator { display: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 6px; border: 1px dashed var(--gold-dark); text-align: left; margin-top: 20px; }
        .link-item { margin-bottom: 10px; font-family: monospace; font-size: 0.8rem; color: #bdc3c7; background: #000; padding: 8px; border-radius: 4px; word-break: break-all; }

        /* --- GAYA UNTUK SUPPORT SECTION & FOOTER --- */
        .support-section {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 2px dashed #5c4a2e;
            text-align: center;
        }
        .support-title {
            font-family: 'Cinzel', serif; 
            color: var(--gold-dark); 
            font-size: 1rem; 
            margin-bottom: 15px; 
            text-shadow: 1px 1px 2px #000;
        }
        .support-buttons { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .btn-support {
            flex: 1; 
            min-width: 160px; 
            text-decoration: none; 
            padding: 12px 10px;
            font-family: 'Cinzel', serif; 
            font-weight: bold; 
            border-radius: 4px;
            color: #fff; 
            border: 1px solid var(--gold-dark);
            transition: all 0.3s ease; 
            text-shadow: 1px 1px 3px #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            font-size: 0.9rem;
        }
        .btn-support:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.3); 
        }
        /* Tombol Saweria (Nuansa Api / Oranye Kuno) */
        .btn-saweria { 
            background: linear-gradient(to bottom, #d35400, #8a0303); 
            border-color: #e67e22; 
        }
        /* Tombol Instagram (Nuansa Ungu Kerajaan / Amethyst) */
        .btn-ig { 
            background: linear-gradient(to bottom, #8e44ad, #2c3e50); 
            border-color: #9b59b6; 
        }
        
        .footer { 
            margin-top: 25px; 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.1rem; 
            color: #888; 
            font-style: italic; 
        }
        .footer span { 
            color: #e74c3c; /* Merah untuk ikon love */
            font-style: normal;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <div class="header"><h1>Gerbang Utama</h1></div>
        
        <div class="input-group">
            <label>Nama Campaign / Room ID</label>
            <input type="text" id="roomName" placeholder="Contoh: CurseOfStrahd" oninput="generateLinks()">
        </div>
        
        <div class="input-group">
            <label>PIN Keamanan (Untuk Player)</label>
            <input type="password" id="roomPin" placeholder="Masukkan 4-6 angka" oninput="generateLinks()">
        </div>
        
        <button class="btn-enter" onclick="enterRoom()">Buka Dashboard GM</button>
        
        <div id="linkGenerator">
            <h3 style="color: var(--gold-light); font-family: 'Cinzel'; margin-top:0;">Link Player (Kirim ke teman)</h3>
            <div class="link-item" id="linkP1">...</div>
            <div class="link-item" id="linkP2">...</div>
            <p style="font-size: 0.8rem; color: #ff6b6b;">*PIN akan dibutuhkan player saat membuka link.</p>
        </div>

        <div class="support-section">
            <div class="support-title">✦ Dukung Sang Pandai Besi (Developer) ✦</div>
            <div class="support-buttons">
                <a href="https://saweria.co/reyzaraf" target="_blank" class="btn-support btn-saweria">☕Support me in Saweria</a>
                <a href="https://instagram.com/reyzaraf" target="_blank" class="btn-support btn-ig"> Follow Ig: @reyzaraf</a>
            </div>
            
            <div class="footer">
                Built by Reynaldy Zara with <span>&hearts;</span>
            </div>
        </div>

    </div>

<script>
    function formatRoomId(rawName) { return encodeURIComponent(rawName.trim().replace(/\s+/g, '-').toLowerCase()); }
    
    function generateLinks() {
        const rawName = document.getElementById('roomName').value;
        const pin = document.getElementById('roomPin').value;
        const linkArea = document.getElementById('linkGenerator');
        
        if (rawName.trim().length > 0 && pin.length > 0) {
            linkArea.style.display = 'block';
            const roomId = formatRoomId(rawName);
            const basePath = window.location.href.replace('index.html', '').split('?')[0];
            document.getElementById('linkP1').innerText = `${basePath}player-controller.html?id=p1&room=${roomId}&key=${btoa(pin)}`;
            document.getElementById('linkP2').innerText = `${basePath}player-controller.html?id=p2&room=${roomId}&key=${btoa(pin)}`;
        } else { 
            linkArea.style.display = 'none'; 
        }
    }
    
    function enterRoom() {
        const rawName = document.getElementById('roomName').value;
        const pin = document.getElementById('roomPin').value;
        if (!rawName || !pin) { alert("Nama Room dan PIN wajib diisi!"); return; }
        const roomId = formatRoomId(rawName);
        
        // Simpan PIN di session agar GM bisa memvalidasi player
        sessionStorage.setItem('gm_pin_' + roomId, pin);
        window.location.href = `gm-dashboard.html?room=${roomId}&key=${btoa(pin)}`;
    }
</script>
</body>
</html>
